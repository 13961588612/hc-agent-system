# 系统域与分段（模板）
# 复制为 `system.yaml` 并按部署裁剪；或通过环境变量 `SYSTEM_CONFIG` 指向绝对/相对路径。
#
# 说明：
# - domains：逻辑域清单（可与 Skill 顶层域、业务线名对齐）。
# - segments：域内业务分段（可与 SkillSegment、DataQuery 域等对齐）。
# - facets：该条目录参与的**分类维度**，可多选：
#   - business — 业务域，如会员、电商、财务等
#   - common — 核心通用能力，如 sql-query、invoke-skill 等底层能力
#   - functional — 功能域，如 sql-query、invoke-skill 等底层能力

version: 1

domains:
  - id: data_query
    title: 数据查询
    description: 问数/数据查询模块;
    facets: [system-module,skills]
  - id: data_analysis
    title: 数据分析
    description: 业务分析/数据分析模块;
    facets: [system-module,skills]
  - id: smart_form
    title: 智能表单
    description: 智能表单模块;
    facets: [system-module,skills]
  - id: intent
    title: 意图
    description: 意图识别/意图分类模块;
    facets: [skills]
  - id: common
    title: 核心通用能力
    description: 核心通用能力域；如 sql-query、invoke-skill 等底层能力
    facets: [skills]

segments:
  - id: member
    title: 会员线;会员资料/会员积分账户/会员券账户/会员储值卡、礼卡账户/会员订单/停车订单/评价记录
    facets: [business,skills]
  - id: ecommerce
    title: 电商线;电商订单/商品/销售/物流/售后
    facets: [business,skills]
  - id: finance
    title: 财务线
    facets: [business,skills]    
  - id: common
    title: 通用能力
    facets: [skills]

# 渠道回复展示配置
channelReply:
  table:
    # 表格最多展示行数（超出会提示已截断）
    maxRows: 20
    # 表格最多展示列数（按首行字段顺序截断）
    maxColumns: 8
    # 表头中文映射（未命中时使用：列N(原字段名)）
    headerZhMap:
      member_code: 会员编码
      member_name: 会员姓名
      mobile: 手机号
      level_name: 会员等级
      points: 积分
      created_at: 创建时间
