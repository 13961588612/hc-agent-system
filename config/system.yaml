# 系统域与分段（模板）
# 复制为 `system.yaml` 并按部署裁剪；或通过环境变量 `SYSTEM_CONFIG` 指向绝对/相对路径。
#
# 说明：
# - intention：意图/能力清单（用于规划阶段 intent 等枚举）。
# - domains：业务分段清单（用于意图与技能分段，如 member/ecommerce/finance）。

version: 1

intention:
  - id: query
    title: 数据查询
    description: 问数/数据查询模块;
  - id: analysis
    title: 数据分析
    description: 业务分析/数据分析模块;
  - id: form
    title: 表单/单据制作
    description: 智能表单模块;

domains:
  - id: member
    title: 会员业务
    description: 会员资料/会员账户（积分，券，储值卡，礼卡卡账户）/会员订单/停车记录/评价记录
    facets: [business]
  - id: ecommerce
    title: 电商业务
    description: 电商业务的订单/销售/物流/售后
    facets: [business]
  - id: finance
    title: 财务线
    description: 财务线;财务账单/财务报表/财务分析
    facets: [business]
  - id: intent
    title: 意图
    description: 意图识别/意图分类模块;
    facets: [intent]
  - id: common
    title: 通用能力
    description: 通用能力域；如 sql-query、invoke-skill 等底层能力
    facets: [functional]
    
