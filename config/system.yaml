# 系统域与分段（模板）
# 复制为 `system.yaml` 并按部署裁剪；或通过环境变量 `SYSTEM_CONFIG` 指向绝对/相对路径。
#
# 说明：
# - domains：逻辑域清单（可与 Skill 顶层域、业务线名对齐）。
# - segments：域内业务分段（可与 SkillSegment、DataQuery 域等对齐）。
# - facets：该条目录参与的**分类维度**，可多选：
#   - business — 业务域，如会员、电商、财务等
#   - common — 核心通用能力，如 sql-query、invoke-skill 等底层能力
#   - functional — 功能域，如 sql-query、invoke-skill 等底层能力

version: 1

domains:
  - id: data_query
    title: 数据查询
    description: 问数查询模块;Skill 顶层域；用于技能分层与渐进披露
    facets: [system-module,skills]
  - id: data_analysis
    title: 数据分析
    description: 数据分析模块;Skill 顶层域；用于技能分层与渐进披露
    facets: [system-module,skills]
  - id: smart_form
    title: 智能表单
    description: 智能表单模块;Skill 顶层域；用于技能分层与渐进披露
    facets: [system-module,skills]
  - id: intent
    title: 意图
    description: Skill 顶层域；用于技能分层与渐进披露
    facets: [skills]
  - id: core
    title: 核心通用能力
    description: skills顶层域；如 sql-query、invoke-skill 等底层能力
    facets: [skills]

segments:
  - id: member
    title: 会员线
    facets: [business,skills]
  - id: ecommerce
    title: 电商线
    facets: [business,skills]
  - id: finance
    title: 财务线
    facets: [business,skills]    
  - id: common
    title: 通用能力
    facets: [skills]
