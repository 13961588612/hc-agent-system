# 复制为 databases.yaml 并按环境填写；密码用环境变量 ${VAR}
# 支持多种 driver、多个逻辑连接名（与 SkillContext.dbClientKey 对应）

defaults: {}

connections:
  # 本地 Demo / 无真实库
  default:
    driver: dummy

  # 示例：会员库（连接串来自环境变量）
  member:
    driver: postgres
    url: ${DB_MEMBER_URL}
    readOnly: false

  # 示例：分析只读库
  analytics:
    driver: postgres
    url: ${DB_ANALYTICS_URL}
    readOnly: true

  # 示例：电商订单库（可为 mysql 等，未接真实驱动时回退 Dummy）
  ecommerce:
    driver: mysql
    url: ${DB_ECOMMERCE_URL}
